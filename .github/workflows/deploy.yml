name: Deploy to Server

on:
  push:
    branches:
      - master
  workflow_dispatch:   # можно запускать вручную из Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          debug: true
          script: whoami

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/dance_bot
            git fetch origin master
            git reset --hard origin/master
            git log -1 --oneline
            /root/dance_bot/venv/bin/pip install -r requirements.txt
            systemctl restart dance_bot
